            schema:
              $ref: '#/components/schemas/PatchedActivity'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedActivity'
      security:
      - ClerkJWT: []
      responses:
        '200':
          content:
            application/json:

  /api/v1/carpool-group-invites/accept/:
    post:
      operationId: carpool_group_invites_accept_create
      description: |-
        POST /carpool-group-invites/accept/ {"token","family"} — join by token.

        Mirrors families.InviteAcceptView: validates a pending token, adds the
        caller's family to the group as a member (idempotent), marks the invite
        accepted.
      tags:
      - carpool-group-invites
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CarpoolInviteAccept'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CarpoolInviteAccept'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CarpoolInviteAccept'
        required: true
      security:
      - ClerkJWT: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''

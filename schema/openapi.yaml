          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Activity'
          description: ''
    patch:
      operationId: activities_partial_update
      description: 'Flat routes per API-DESIGN.md: PATCH/DELETE /activities/{id}/.'
      parameters:
      - in: path
        name: id
        schema:
